<div class="w-full h-20 fixed top-0 flex justify-center items-center z-70 pt-5"
    (mouseenter)="show()"
    (mouseleave)="hide()">
    <header
        class="w-1/2 h-full bg-white/10 backdrop-blur-2xl rounded-full flex border border-amber-50/20 transition-all duration-500 ease-in-out"
        [class.translate-y-0]="isVisible()"
        [class.opacity-100]="isVisible()"
        [class.-translate-y-full]="!isVisible()"
        [class.opacity-0]="!isVisible()">
        <div class="w-1/4 h-full flex items-center justify-center">
            <img class="cursor-pointer hover:scale-110 transition-transform" src="developer_mode_tv.svg"
                onclick="window.location.href = ''" alt="imagem com o icone de code" />
        </div>
        <nav class="w-full h-full flex items-center justify-center gap-0.5">
            <button
                class="w-full h-full flex items-center justify-center text-amber-50 hover:text-amber-500 transition-colors cursor-pointer"
                (click)="navigate('home', $event)">Inicio</button>
            <button class="w-full h-full flex items-center justify-center text-amber-50 hover:text-amber-500 transition-colors cursor-pointer"
                (click)="navigate('projects', $event)">Projetos</button>
            <button class="w-full h-full flex items-center justify-center text-amber-50 hover:text-amber-500 transition-colors cursor-pointer"
                (click)="navigate('contact', $event)">Contato</button>
        </nav>
    </header>
</div>
